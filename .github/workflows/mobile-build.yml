name: Mobile Build (APK + iOS)

# Capacitor shell for phone / Android tablet / iPhone / iPad.
# Pattern aligned with photo-booth; library loads live Next.js via server.url.

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
    inputs:
      build_apk:
        description: "Build Android APK (debug)"
        required: false
        default: true
        type: boolean
      build_ios_simulator_app:
        description: "Build iOS Simulator .app (iPhone/iPad capable; no signing)"
        required: false
        default: true
        type: boolean
      build_ipa:
        description: "Build signed IPA (requires IOS_* secrets)"
        required: false
        default: false
        type: boolean
      connectivity:
        description: "local (LAN HTTP) or public (HTTPS endpoints)"
        required: false
        default: "local"
        type: choice
        options:
          - local
          - public
      lan_ip:
        description: "Host LAN IPv4 for local connectivity (ignored if public URLs set)"
        required: false
        default: "192.168.0.1"
        type: string
      web_url:
        description: "Override web URL (e.g. http://192.168.x.x:3300 or https://library.example.com)"
        required: false
        default: ""
        type: string
      api_url:
        description: "Override API URL (…/api)"
        required: false
        default: ""
        type: string
      keycloak_url:
        description: "Override Keycloak base URL"
        required: false
        default: ""
        type: string
      shell_mode:
        description: "remote = load web URL directly; bridge = inject API/KC overrides then redirect"
        required: false
        default: "remote"
        type: choice
        options:
          - remote
          - bridge

jobs:
  prepare-config:
    name: Prepare Capacitor config
    runs-on: ubuntu-latest
    outputs:
      web_url: ${{ steps.meta.outputs.web_url }}
      api_url: ${{ steps.meta.outputs.api_url }}
      keycloak_url: ${{ steps.meta.outputs.keycloak_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install mobile dependencies
        run: |
          cd mobile
          npm ci || npm install --legacy-peer-deps

      - name: Prepare config
        id: prep
        env:
          LIBRARY_CONNECTIVITY: ${{ inputs.connectivity || 'local' }}
          LIBRARY_SHELL_MODE: ${{ inputs.shell_mode || 'remote' }}
          LIBRARY_LAN_IP: ${{ inputs.lan_ip || vars.LIBRARY_LAN_IP || '192.168.0.1' }}
          LIBRARY_WEB_URL: ${{ inputs.web_url || vars.LIBRARY_WEB_URL || '' }}
          LIBRARY_API_URL: ${{ inputs.api_url || vars.LIBRARY_API_URL || '' }}
          LIBRARY_KEYCLOAK_URL: ${{ inputs.keycloak_url || vars.LIBRARY_KEYCLOAK_URL || '' }}
        run: |
          cd mobile
          if [ "${LIBRARY_CONNECTIVITY}" = "local" ] && [ -z "${LIBRARY_WEB_URL}" ]; then
            export LIBRARY_LAN_IP="${LIBRARY_LAN_IP:-192.168.0.1}"
          fi
          npm run prepare-config
          test -f capacitor.config.json
          test -f www/index.html
          test -f build-info.json
          cat capacitor.config.json
          cat build-info.json

      - name: Export URL outputs
        id: meta
        run: |
          cd mobile
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          info = json.loads(Path("build-info.json").read_text())
          out = Path(os.environ["GITHUB_OUTPUT"])
          with out.open("a") as f:
              f.write(f"web_url={info['webUrl']}\n")
              f.write(f"api_url={info['apiUrl']}\n")
              f.write(f"keycloak_url={info['keycloakUrl']}\n")
          PY

      - name: Upload prepared mobile tree
        uses: actions/upload-artifact@v4
        with:
          name: mobile-prepared-${{ github.run_number }}
          path: |
            mobile/capacitor.config.json
            mobile/build-info.json
            mobile/www
            mobile/package.json
            mobile/package-lock.json
            mobile/scripts

      - name: Job summary
        run: |
          {
            echo "## Mobile endpoints (baked)"
            echo ""
            echo "| Key | Value |"
            echo "|-----|-------|"
            echo "| web | \`${{ steps.meta.outputs.web_url }}\` |"
            echo "| api | \`${{ steps.meta.outputs.api_url }}\` |"
            echo "| keycloak | \`${{ steps.meta.outputs.keycloak_url }}\` |"
            echo ""
            echo "Override via workflow inputs: \`web_url\`, \`api_url\`, \`keycloak_url\`, or \`shell_mode=bridge\`."
          } >> "$GITHUB_STEP_SUMMARY"
  android-apk:
    name: Android APK
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_apk }}
    needs: prepare-config
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download prepared config
        uses: actions/download-artifact@v4
        with:
          name: mobile-prepared-${{ github.run_number }}
          path: mobile-prepared

      - name: Restore prepared files
        run: |
          cp -R mobile-prepared/* mobile/ || true
          cp mobile-prepared/capacitor.config.json mobile/capacitor.config.json
          cp mobile-prepared/build-info.json mobile/build-info.json || true
          mkdir -p mobile/www
          cp -R mobile-prepared/www/* mobile/www/

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install mobile dependencies
        run: |
          cd mobile
          npm ci || npm install --legacy-peer-deps
          # Platforms required for `cap add` (also in package.json)
          npm install @capacitor/android@5 --no-save --legacy-peer-deps

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: "tools platform-tools platforms;android-34 build-tools;34.0.0"

      - name: Capacitor Android sync
        env:
          LIBRARY_CONNECTIVITY: ${{ inputs.connectivity || 'local' }}
          LIBRARY_SHELL_MODE: ${{ inputs.shell_mode || 'remote' }}
          LIBRARY_LAN_IP: ${{ inputs.lan_ip || vars.LIBRARY_LAN_IP || '192.168.0.1' }}
          LIBRARY_WEB_URL: ${{ inputs.web_url || vars.LIBRARY_WEB_URL || '' }}
          LIBRARY_API_URL: ${{ inputs.api_url || vars.LIBRARY_API_URL || '' }}
          LIBRARY_KEYCLOAK_URL: ${{ inputs.keycloak_url || vars.LIBRARY_KEYCLOAK_URL || '' }}
        run: |
          cd mobile
          npm run prepare-config
          npx cap add android
          npx cap sync android
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          test -f "$MANIFEST"
          /usr/bin/python3 - <<'PY'
          import xml.etree.ElementTree as ET
          from pathlib import Path
          manifest_path = Path("android/app/src/main/AndroidManifest.xml")
          ET.register_namespace("android", "http://schemas.android.com/apk/res/android")
          tree = ET.parse(manifest_path)
          root = tree.getroot()
          android_ns = "{http://schemas.android.com/apk/res/android}"
          app = root.find("application")
          if app is not None:
              app.set(f"{android_ns}usesCleartextTraffic", "true")
          # Large screens / tablets
          if root.find("supports-screens") is None:
              ET.SubElement(
                  root,
                  "supports-screens",
                  {
                      f"{android_ns}smallScreens": "true",
                      f"{android_ns}normalScreens": "true",
                      f"{android_ns}largeScreens": "true",
                      f"{android_ns}xlargeScreens": "true",
                      f"{android_ns}anyDensity": "true",
                  },
              )
          tree.write(manifest_path, encoding="utf-8", xml_declaration=True)
          PY
          if [ -f "android/variables.gradle" ]; then
            sed -E -i.bak 's/minSdkVersion *= *[0-9]+/minSdkVersion = 24/' android/variables.gradle || true
            sed -E -i.bak 's/compileSdkVersion *= *[0-9]+/compileSdkVersion = 34/' android/variables.gradle || true
            sed -E -i.bak 's/targetSdkVersion *= *[0-9]+/targetSdkVersion = 34/' android/variables.gradle || true
            rm -f android/variables.gradle.bak
          fi

      - name: Build Android APK
        run: |
          cd mobile/android
          ./gradlew clean assembleDebug --no-daemon

      - name: Upload APK
        run: |
          mkdir -p artifacts
          APK_SRC="$(ls -1 mobile/android/app/build/outputs/apk/debug/*.apk | head -n 1)"
          cp "$APK_SRC" "artifacts/library-management-${{ github.run_number }}.apk"
          cp mobile/build-info.json "artifacts/build-info.json"

      - uses: actions/upload-artifact@v4
        with:
          name: library-management-apk-${{ github.run_number }}
          path: |
            artifacts/library-management-${{ github.run_number }}.apk
            artifacts/build-info.json

  ios-simulator:
    name: iOS Simulator (.app)
    if: ${{ github.event_name != 'workflow_dispatch' || inputs.build_ios_simulator_app }}
    needs: prepare-config
    runs-on: macos-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Ensure CocoaPods
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods --no-document
          fi

      - name: Install mobile dependencies
        run: |
          cd mobile
          npm ci || npm install --legacy-peer-deps
          npm install @capacitor/ios@5 --no-save --legacy-peer-deps

      - name: Capacitor iOS sync
        env:
          LIBRARY_CONNECTIVITY: ${{ inputs.connectivity || 'local' }}
          LIBRARY_SHELL_MODE: ${{ inputs.shell_mode || 'remote' }}
          LIBRARY_LAN_IP: ${{ inputs.lan_ip || vars.LIBRARY_LAN_IP || '192.168.0.1' }}
          LIBRARY_WEB_URL: ${{ inputs.web_url || vars.LIBRARY_WEB_URL || '' }}
          LIBRARY_API_URL: ${{ inputs.api_url || vars.LIBRARY_API_URL || '' }}
          LIBRARY_KEYCLOAK_URL: ${{ inputs.keycloak_url || vars.LIBRARY_KEYCLOAK_URL || '' }}
        run: |
          cd mobile
          npm run prepare-config
          npx cap add ios
          npx cap sync ios

      - name: pod install
        run: |
          cd mobile/ios/App
          pod install --repo-update

      - name: Build iOS Simulator app
        run: |
          cd mobile/ios
          mkdir -p build
          xcodebuild \
            -workspace "App/App.xcworkspace" \
            -scheme "App" \
            -sdk iphonesimulator \
            -configuration Debug \
            -destination 'generic/platform=iOS Simulator' \
            -derivedDataPath "build" \
            clean build CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO

      - uses: actions/upload-artifact@v4
        with:
          name: library-management-ios-sim-${{ github.run_number }}
          path: mobile/ios/build/Build/Products/Debug-iphonesimulator/*.app
          if-no-files-found: error

  ios-ipa:
    name: iOS IPA (signed)
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.build_ipa }}
    needs: prepare-config
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Verify iOS signing secrets
        run: |
          missing=0
          for s in IOS_CERT_P12_BASE64 IOS_PROVISIONING_PROFILE_BASE64 IOS_BUNDLE_ID; do
            if [ -z "${!s:-}" ]; then
              echo "Missing secret: $s"
              missing=1
            fi
          done
          if [ "$missing" = "1" ]; then
            echo "Provide IOS_CERT_P12_BASE64, IOS_PROVISIONING_PROFILE_BASE64, IOS_BUNDLE_ID (and usually IOS_CERT_PASSWORD)."
            exit 1
          fi
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}

      - name: Ensure CocoaPods
        run: |
          if ! command -v pod >/dev/null 2>&1; then
            sudo gem install cocoapods --no-document
          fi

      - name: Install + sync iOS
        env:
          LIBRARY_CONNECTIVITY: ${{ inputs.connectivity || 'public' }}
          LIBRARY_SHELL_MODE: ${{ inputs.shell_mode || 'remote' }}
          LIBRARY_LAN_IP: ${{ inputs.lan_ip || '192.168.0.1' }}
          LIBRARY_WEB_URL: ${{ inputs.web_url || vars.LIBRARY_WEB_URL || '' }}
          LIBRARY_API_URL: ${{ inputs.api_url || vars.LIBRARY_API_URL || '' }}
          LIBRARY_KEYCLOAK_URL: ${{ inputs.keycloak_url || vars.LIBRARY_KEYCLOAK_URL || '' }}
        run: |
          cd mobile
          npm ci || npm install --legacy-peer-deps
          npm install @capacitor/ios@5 --no-save --legacy-peer-deps
          npm run prepare-config
          npx cap add ios
          npx cap sync ios
          cd ios/App && pod install --repo-update

      - name: Import signing + archive
        env:
          IOS_CERT_P12_BASE64: ${{ secrets.IOS_CERT_P12_BASE64 }}
          IOS_CERT_PASSWORD: ${{ secrets.IOS_CERT_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_BUNDLE_ID: ${{ secrets.IOS_BUNDLE_ID }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/ios-cert.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          echo "$IOS_CERT_P12_BASE64" | base64 --decode > "$CERT_PATH"
          echo "$IOS_PROVISIONING_PROFILE_BASE64" | base64 --decode > "$PROFILE_PATH"

          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 32)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "${IOS_CERT_PASSWORD:-}" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print UUID' /dev/stdin <<< "$(security cms -D -i "$PROFILE_PATH")")"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/${PROFILE_UUID}.mobileprovision"

          cd mobile/ios
          mkdir -p build
          xcodebuild \
            -workspace "App/App.xcworkspace" \
            -scheme "App" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "build/App.xcarchive" \
            -destination 'generic/platform=iOS' \
            PRODUCT_BUNDLE_IDENTIFIER="$IOS_BUNDLE_ID" \
            CODE_SIGN_STYLE=Manual \
            archive

          cat > build/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>ad-hoc</string>
            <key>signingStyle</key><string>manual</string>
            <key>compileBitcode</key><false/>
          </dict>
          </plist>
          EOF

          xcodebuild -exportArchive \
            -archivePath "build/App.xcarchive" \
            -exportPath "build/export" \
            -exportOptionsPlist "build/ExportOptions.plist"

      - uses: actions/upload-artifact@v4
        with:
          name: library-management-ipa-${{ github.run_number }}
          path: mobile/ios/build/export/*.ipa
          if-no-files-found: error
