name: library-management

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${LIBRARY_HOST_FRONTEND_PORT:-3300}:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:${LIBRARY_HOST_BACKEND_PORT:-3301}/api
      - NEXT_PUBLIC_IAM_PROVIDER=${IAM_PROVIDER:-legacy}
      - NEXT_PUBLIC_KEYCLOAK_URL=${NEXT_PUBLIC_KEYCLOAK_URL:-http://localhost:3510}
      - NEXT_PUBLIC_KEYCLOAK_REALM=${KEYCLOAK_REALM:-library}
      - NEXT_PUBLIC_KEYCLOAK_CLIENT_ID=${KEYCLOAK_CLIENT_ID:-library-frontend}
      - OTEL_SERVICE_NAME=library-management-frontend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_RESOURCE_ATTRIBUTES=tenant.id=local-dev,service.namespace=library-management
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    networks:
      - library-network
      - obs-net
    container_name: library-management-frontend
    labels:
      - "com.docker.compose.project=library-management"
      - "com.docker.compose.service=frontend"
      - "app.name=library-management"
      - "app.component=frontend"
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${LIBRARY_HOST_BACKEND_PORT:-3301}:4000"
    volumes:
      - ./backend/src:/app/src
      - ./backend/package.json:/app/package.json
      - ./backend/tsconfig.json:/app/tsconfig.json
      - ./backend/tsconfig.build.json:/app/tsconfig.build.json
      - ./data:/app/data
      - ./backend/backups:/app/backend/backups
      - /app/node_modules  # Prevent host node_modules from overriding container's compiled modules
      - ../identity-platform/secrets/firebase-dev.json:/app/secrets/firebase-dev.json:ro

    environment:
      - NODE_ENV=development
      - PORT=4000
      - SQLITE_PATH=/app/data/library.sqlite
      - JWT_SECRET=${JWT_SECRET:-development-secret-key}
      - CORS_ORIGIN=http://localhost:${LIBRARY_HOST_FRONTEND_PORT:-3300}
      - IAM_PROVIDER=${IAM_PROVIDER:-legacy}
      - DATA_STORAGE=${DATA_STORAGE:-legacy}
      - KEYCLOAK_URL=${KEYCLOAK_INTERNAL_URL:-http://host.docker.internal:3510}
      - KEYCLOAK_REALM=${KEYCLOAK_REALM:-library}
      - KEYCLOAK_ADMIN=${KEYCLOAK_ADMIN:-admin}
      - KEYCLOAK_ADMIN_PASSWORD=${KEYCLOAK_ADMIN_PASSWORD:-admin}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID:-}
      - APP_FIRESTORE_PREFIX=${APP_FIRESTORE_PREFIX:-library}
      - GOOGLE_APPLICATION_CREDENTIALS=${GOOGLE_APPLICATION_CREDENTIALS:-/app/secrets/firebase-dev.json}
      - OTEL_SERVICE_NAME=library-management-backend
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4318
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_RESOURCE_ATTRIBUTES=tenant.id=local-dev,service.namespace=library-management
    networks:
      - library-network
      - obs-net
    container_name: library-management-backend
    labels:
      - "com.docker.compose.project=library-management"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:4000/api/books', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  library-network:
    driver: bridge
  obs-net:
    external: true
    name: obs_net
